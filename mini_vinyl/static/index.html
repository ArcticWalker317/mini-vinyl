<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mini-vinyl</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #fafafa;
    --fg: #1a1a1a;
    --muted: #666;
    --card: #fff;
    --border: #ddd;
    --accent: #b5482a;
    --accent-fg: #fff;
    --ok: #2e7d32;
    --err: #c62828;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16130f;
      --fg: #f0ece6;
      --muted: #aaa;
      --card: #241f1a;
      --border: #3a332b;
      --accent: #d97a55;
      --accent-fg: #1a1005;
      --ok: #7cd992;
      --err: #ff8a80;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
  }
  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 1rem 1rem 3rem;
  }
  h1 {
    font-size: 1.3rem;
    margin: 0.5rem 0 1rem;
  }
  .screen[hidden] { display: none; }
  .home-screen {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2.5rem;
    text-align: center;
  }
  .home-brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }
  .home-logo {
    width: 140px;
    height: 140px;
    object-fit: contain;
  }
  .home-title {
    font-size: 2.2rem;
    margin: 0;
  }
  .home-buttons {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
    max-width: 280px;
  }
  button.wide {
    width: 100%;
    padding: 0.85rem 1rem;
  }
  button.back {
    background: transparent;
    color: var(--muted);
    padding: 0.3rem 0;
    margin-bottom: 0.5rem;
  }
  h2.section {
    font-size: 1rem;
    color: var(--muted);
    margin: 2rem 0 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  form#search-form {
    display: flex;
    gap: 0.5rem;
  }
  input[type="text"] {
    flex: 1;
    font-size: 1rem;
    padding: 0.6rem 0.7rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--fg);
  }
  button {
    font-size: 1rem;
    padding: 0.6rem 1rem;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: var(--accent-fg);
    cursor: pointer;
    white-space: nowrap;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  button.secondary {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
  }
  button.danger {
    background: var(--err);
    color: #fff;
  }
  button.small {
    font-size: 0.85rem;
    padding: 0.4rem 0.7rem;
  }
  ul.list {
    list-style: none;
    margin: 1rem 0 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  li.item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
  }
  .item-text { flex: 1; min-width: 0; }
  .item-title {
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item-sub {
    color: var(--muted);
    font-size: 0.85rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item-sub.err { color: var(--err); }
  #status-msg {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.5rem;
    min-height: 1.2em;
  }
  #library-empty, #playlists-empty, #playlist-songs-empty {
    color: var(--muted);
    font-size: 0.9rem;
  }
  #playlists-status {
    color: var(--err);
    font-size: 0.9rem;
    margin-top: 0.5rem;
  }
  #playlist-song-search {
    width: 100%;
    margin: 0.5rem 0;
  }
  #write-playlist {
    margin-top: 2rem;
  }
  .item.clickable {
    cursor: pointer;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .overlay[hidden] { display: none; }
  .modal {
    background: var(--card);
    border-radius: 14px;
    padding: 1.5rem;
    max-width: 380px;
    width: 100%;
  }
  .modal h2 {
    margin: 0 0 0.75rem;
    font-size: 1.1rem;
  }
  .code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 1.15rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    word-break: break-all;
    margin: 0.5rem 0 1rem;
  }
  .write-status {
    font-size: 0.95rem;
    margin-bottom: 1rem;
  }
  .write-status.ok { color: var(--ok); }
  .write-status.err { color: var(--err); }
  .modal-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
  }
</style>
</head>
<body>
<main>
  <section class="screen home-screen" id="screen-home">
    <div class="home-brand">
      <img class="home-logo" src="/static/vinyl_logo.png" alt="">
      <h1 class="home-title">mini-vinyl</h1>
    </div>
    <div class="home-buttons">
      <button type="button" class="wide" id="nav-add">Add Songs</button>
      <button type="button" class="wide" id="nav-library">View Library</button>
      <button type="button" class="wide secondary" id="nav-playlist">Create Playlist</button>
    </div>
  </section>

  <section class="screen" id="screen-add" hidden>
    <button type="button" class="back" id="back-from-add">&larr; Back</button>
    <h1>Add Songs</h1>
    <form id="search-form">
      <input type="text" id="query" placeholder="Search for a song..." autocomplete="off">
      <button type="submit">Search</button>
    </form>
    <div id="status-msg"></div>
    <div id="already-downloaded-section" hidden>
      <h2 class="section">Already downloaded songs</h2>
      <ul class="list" id="already-downloaded"></ul>
    </div>
    <div id="to-add-section" hidden>
      <h2 class="section">Add:</h2>
      <ul class="list" id="results"></ul>
    </div>
  </section>

  <section class="screen" id="screen-library" hidden>
    <button type="button" class="back" id="back-from-library">&larr; Back</button>
    <h1>Your Library</h1>
    <div id="library-empty">Nothing added yet.</div>
    <ul class="list" id="library"></ul>
  </section>

  <section class="screen" id="screen-playlists" hidden>
    <button type="button" class="back" id="back-from-playlists">&larr; Back</button>
    <h1>Playlists</h1>
    <form id="create-playlist-form">
      <input type="text" id="playlist-name" placeholder="New playlist name..." autocomplete="off">
      <button type="submit">Create</button>
    </form>
    <div id="playlists-status"></div>
    <div id="playlists-empty">No playlists yet.</div>
    <ul class="list" id="playlists-list"></ul>
  </section>

  <section class="screen" id="screen-playlist-detail" hidden>
    <button type="button" class="back" id="back-from-playlist-detail">&larr; Back</button>
    <h1 id="playlist-detail-title"></h1>
    <div id="playlist-songs-empty">No songs added yet.</div>
    <ul class="list" id="playlist-songs"></ul>

    <h2 class="section">Add from your library</h2>
    <input type="text" id="playlist-song-search" placeholder="Search your downloaded songs..." autocomplete="off">
    <ul class="list" id="playlist-song-results"></ul>

    <button type="button" class="wide" id="write-playlist" disabled>Write playlist to tag</button>
  </section>
</main>

<div class="overlay" id="overlay" hidden>
  <div class="modal">
    <h2>Write this tag</h2>
    <div class="code" id="modal-code"></div>
    <div class="write-status" id="write-status"></div>
    <div class="modal-actions">
      <button type="button" class="danger" id="overwrite-write" hidden>Overwrite current song</button>
      <button type="button" class="secondary" id="retry-write" hidden>Retry write</button>
      <button type="button" class="secondary" id="close-modal">Close</button>
    </div>
  </div>
</div>

<script>
const resultsEl = document.getElementById("results");
const statusMsgEl = document.getElementById("status-msg");
const alreadyDownloadedSectionEl = document.getElementById("already-downloaded-section");
const alreadyDownloadedEl = document.getElementById("already-downloaded");
const toAddSectionEl = document.getElementById("to-add-section");
const libraryEl = document.getElementById("library");
const libraryEmptyEl = document.getElementById("library-empty");
const playlistsListEl = document.getElementById("playlists-list");
const playlistsEmptyEl = document.getElementById("playlists-empty");
const playlistsStatusEl = document.getElementById("playlists-status");
const playlistDetailTitleEl = document.getElementById("playlist-detail-title");
const playlistSongsEl = document.getElementById("playlist-songs");
const playlistSongsEmptyEl = document.getElementById("playlist-songs-empty");
const playlistSongSearchEl = document.getElementById("playlist-song-search");
const playlistSongResultsEl = document.getElementById("playlist-song-results");
const writePlaylistBtn = document.getElementById("write-playlist");
const overlayEl = document.getElementById("overlay");
const modalCodeEl = document.getElementById("modal-code");
const writeStatusEl = document.getElementById("write-status");
const retryWriteBtn = document.getElementById("retry-write");
const overwriteWriteBtn = document.getElementById("overwrite-write");
const closeModalBtn = document.getElementById("close-modal");

const STATUS_LABELS = {
  queued: "Queued…",
  probing: "Fetching info…",
  reserved: "Starting download…",
  downloading: "Downloading…",
  ready: "Ready",
  failed: "Failed",
};

let writePollHandle = null;

function showScreen(id) {
  for (const screen of document.querySelectorAll(".screen")) {
    screen.hidden = screen.id !== id;
  }
}

document.getElementById("nav-add").addEventListener("click", () => showScreen("screen-add"));
document.getElementById("nav-library").addEventListener("click", () => {
  showScreen("screen-library");
  refreshLibrary();
});
document.getElementById("nav-playlist").addEventListener("click", () => {
  showScreen("screen-playlists");
  refreshPlaylists();
});
document.getElementById("back-from-add").addEventListener("click", () => showScreen("screen-home"));
document.getElementById("back-from-library").addEventListener("click", () => showScreen("screen-home"));
document.getElementById("back-from-playlists").addEventListener("click", () => showScreen("screen-home"));
document.getElementById("back-from-playlist-detail").addEventListener("click", () => showScreen("screen-playlists"));

document.getElementById("search-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const query = document.getElementById("query").value.trim();
  if (!query) return;

  statusMsgEl.textContent = "Searching...";
  resultsEl.innerHTML = "";
  alreadyDownloadedEl.innerHTML = "";
  alreadyDownloadedSectionEl.hidden = true;
  toAddSectionEl.hidden = true;

  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
    const data = await res.json();
    if (data.error) {
      statusMsgEl.textContent = data.error;
      return;
    }
    statusMsgEl.textContent = data.results.length ? "" : "No results.";

    const alreadyDownloaded = data.results.filter((r) => r.code);
    const toAdd = data.results.filter((r) => !r.code);

    for (const r of alreadyDownloaded) {
      alreadyDownloadedEl.appendChild(renderAlreadyDownloaded(r));
    }
    alreadyDownloadedSectionEl.hidden = alreadyDownloaded.length === 0;

    for (const r of toAdd) {
      resultsEl.appendChild(renderResult(r));
    }
    toAddSectionEl.hidden = toAdd.length === 0;
  } catch (err) {
    statusMsgEl.textContent = "Search failed - is the Pi reachable?";
  }
});

function renderAlreadyDownloaded(r) {
  const li = document.createElement("li");
  li.className = "item";
  li.innerHTML = `
    <div class="item-text">
      <div class="item-title"></div>
      <div class="item-sub"></div>
    </div>
    <button type="button" class="small">Write tag</button>
  `;
  li.querySelector(".item-title").textContent = r.title;
  li.querySelector(".item-sub").textContent = r.uploader;
  li.querySelector("button").addEventListener("click", () => openWriteModal(r.code));
  return li;
}

function renderResult(r) {
  const li = document.createElement("li");
  li.className = "item";
  li.innerHTML = `
    <div class="item-text">
      <div class="item-title"></div>
      <div class="item-sub"></div>
    </div>
    <button type="button" class="small">Add</button>
  `;
  li.querySelector(".item-title").textContent = r.title;
  li.querySelector(".item-sub").textContent = r.uploader;
  const btn = li.querySelector("button");
  btn.addEventListener("click", async () => {
    btn.disabled = true;
    btn.textContent = "Adding…";
    try {
      await fetch("/api/songs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: r.url }),
      });
      btn.textContent = "Queued ✓";
      refreshLibrary();
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Add";
      statusMsgEl.textContent = "Couldn't reach the Pi.";
    }
  });
  return li;
}

async function refreshLibrary() {
  let data;
  try {
    const res = await fetch("/api/library");
    data = await res.json();
  } catch (err) {
    return; // transient network hiccup - next poll will retry
  }

  libraryEl.innerHTML = "";
  libraryEmptyEl.hidden = data.entries.length > 0;
  for (const entry of data.entries) {
    libraryEl.appendChild(renderLibraryEntry(entry));
  }
}

function renderLibraryEntry(entry) {
  const li = document.createElement("li");
  li.className = "item";

  const label = STATUS_LABELS[entry.status] || entry.status;
  const sub = entry.status === "failed" && entry.detail ? `${label}: ${entry.detail}` : label;

  li.innerHTML = `
    <div class="item-text">
      <div class="item-title"></div>
      <div class="item-sub"></div>
    </div>
  `;
  li.querySelector(".item-title").textContent = entry.title || entry.url;
  const subEl = li.querySelector(".item-sub");
  subEl.textContent = entry.artist ? `${entry.artist} — ${sub}` : sub;
  if (entry.status === "failed") subEl.classList.add("err");

  if (entry.status === "ready") {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "small";
    btn.textContent = "Write tag";
    btn.addEventListener("click", () => openWriteModal(entry.code));
    li.appendChild(btn);
  } else if (entry.status === "failed") {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "small secondary";
    btn.textContent = "Retry";
    btn.addEventListener("click", async () => {
      btn.disabled = true;
      await fetch("/api/songs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: entry.url }),
      });
      refreshLibrary();
    });
    li.appendChild(btn);
  }

  return li;
}

// ---- Playlists ----

let currentPlaylistCode = null;
let downloadedSongsCache = []; // "ready" library entries, refreshed on entering a playlist's detail screen

document.getElementById("create-playlist-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const nameInput = document.getElementById("playlist-name");
  const name = nameInput.value.trim();
  if (!name) return;

  playlistsStatusEl.textContent = "";
  try {
    const res = await fetch("/api/playlists", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name }),
    });
    const playlist = await res.json();
    if (playlist.error) {
      playlistsStatusEl.textContent = playlist.error;
      return;
    }
    nameInput.value = "";
    openPlaylistDetail(playlist.code);
  } catch (err) {
    playlistsStatusEl.textContent = "Couldn't reach the Pi.";
  }
});

async function refreshPlaylists() {
  let data;
  try {
    const res = await fetch("/api/playlists");
    data = await res.json();
  } catch (err) {
    return; // transient network hiccup
  }

  playlistsListEl.innerHTML = "";
  playlistsEmptyEl.hidden = data.playlists.length > 0;
  for (const p of data.playlists) {
    playlistsListEl.appendChild(renderPlaylistListItem(p));
  }
}

function renderPlaylistListItem(p) {
  const li = document.createElement("li");
  li.className = "item clickable";
  li.innerHTML = `
    <div class="item-text">
      <div class="item-title"></div>
      <div class="item-sub"></div>
    </div>
  `;
  li.querySelector(".item-title").textContent = p.name;
  li.querySelector(".item-sub").textContent = `${p.songs.length} song${p.songs.length === 1 ? "" : "s"}`;
  li.addEventListener("click", () => openPlaylistDetail(p.code));
  return li;
}

async function openPlaylistDetail(code) {
  currentPlaylistCode = code;
  playlistSongSearchEl.value = "";
  playlistSongResultsEl.innerHTML = "";
  showScreen("screen-playlist-detail");
  await Promise.all([loadPlaylistDetail(), loadDownloadedSongsCache()]);
}

async function loadPlaylistDetail() {
  try {
    const res = await fetch(`/api/playlists/${encodeURIComponent(currentPlaylistCode)}`);
    const playlist = await res.json();
    if (playlist.error) return;

    playlistDetailTitleEl.textContent = playlist.name;
    playlistSongsEl.innerHTML = "";
    playlistSongsEmptyEl.hidden = playlist.songs.length > 0;
    for (const song of playlist.songs) {
      playlistSongsEl.appendChild(renderPlaylistSong(song));
    }
    writePlaylistBtn.disabled = playlist.songs.length === 0;
  } catch (err) {
    // transient network hiccup - next interaction can retry
  }
}

function renderPlaylistSong(song) {
  const li = document.createElement("li");
  li.className = "item";
  li.innerHTML = `
    <div class="item-text">
      <div class="item-title"></div>
      <div class="item-sub"></div>
    </div>
    <button type="button" class="small secondary">Remove</button>
  `;
  li.querySelector(".item-title").textContent = song.title;
  li.querySelector(".item-sub").textContent = song.artist || "";
  li.querySelector("button").addEventListener("click", async () => {
    await fetch(
      `/api/playlists/${encodeURIComponent(currentPlaylistCode)}/songs/${encodeURIComponent(song.code)}`,
      { method: "DELETE" }
    );
    loadPlaylistDetail();
  });
  return li;
}

async function loadDownloadedSongsCache() {
  try {
    const res = await fetch("/api/library");
    const data = await res.json();
    downloadedSongsCache = data.entries.filter((e) => e.status === "ready");
  } catch (err) {
    downloadedSongsCache = [];
  }
}

playlistSongSearchEl.addEventListener("input", (e) => {
  const q = e.target.value.trim().toLowerCase();
  playlistSongResultsEl.innerHTML = "";
  if (!q) return;
  const matches = downloadedSongsCache
    .filter(
      (entry) =>
        (entry.title || "").toLowerCase().includes(q) || (entry.artist || "").toLowerCase().includes(q)
    )
    .slice(0, 20);
  for (const entry of matches) {
    playlistSongResultsEl.appendChild(renderPlaylistSongResult(entry));
  }
});

function renderPlaylistSongResult(entry) {
  const li = document.createElement("li");
  li.className = "item";
  li.innerHTML = `
    <div class="item-text">
      <div class="item-title"></div>
      <div class="item-sub"></div>
    </div>
    <button type="button" class="small">Add</button>
  `;
  li.querySelector(".item-title").textContent = entry.title;
  li.querySelector(".item-sub").textContent = entry.artist || "";
  const btn = li.querySelector("button");
  btn.addEventListener("click", async () => {
    btn.disabled = true;
    await fetch(`/api/playlists/${encodeURIComponent(currentPlaylistCode)}/songs`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ song_code: entry.code }),
    });
    btn.textContent = "Added ✓";
    loadPlaylistDetail();
  });
  return li;
}

writePlaylistBtn.addEventListener("click", () => {
  if (currentPlaylistCode) openWriteModal(`playlist:${currentPlaylistCode}`);
});

function openWriteModal(code) {
  overlayEl.hidden = false;
  modalCodeEl.textContent = code;
  armWrite(code, false);
}

async function armWrite(code, force) {
  writeStatusEl.textContent = force
    ? "Place the tag to overwrite back on the mini-vinyl reader now…"
    : "Place a blank tag on the mini-vinyl reader now…";
  writeStatusEl.className = "write-status";
  retryWriteBtn.hidden = true;
  overwriteWriteBtn.hidden = true;
  if (writePollHandle) clearInterval(writePollHandle);

  try {
    await fetch("/api/write", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code, force }),
    });
  } catch (err) {
    writeStatusEl.textContent = "Couldn't reach the Pi to arm the write.";
    writeStatusEl.className = "write-status err";
    return;
  }
  writePollHandle = setInterval(() => pollWriteStatus(code), 1000);
}

async function pollWriteStatus(code) {
  try {
    const res = await fetch(`/api/write/status?code=${encodeURIComponent(code)}`);
    const data = await res.json();
    if (data.status === "waiting") return;

    clearInterval(writePollHandle);
    writePollHandle = null;
    if (data.status === "success") {
      writeStatusEl.textContent = "Tag written!";
      writeStatusEl.className = "write-status ok";
    } else if (data.status === "timeout") {
      writeStatusEl.textContent = "Timed out waiting for a tag.";
      writeStatusEl.className = "write-status err";
      retryWriteBtn.hidden = false;
    } else if (data.status === "error" && data.detail === "tag already has data") {
      writeStatusEl.textContent = "That tag already has a song on it.";
      writeStatusEl.className = "write-status err";
      overwriteWriteBtn.hidden = false;
    } else if (data.status === "error") {
      writeStatusEl.textContent = data.detail || "Couldn't write the tag.";
      writeStatusEl.className = "write-status err";
      retryWriteBtn.hidden = false;
    } else {
      writeStatusEl.textContent = "Write request was superseded.";
      writeStatusEl.className = "write-status err";
      retryWriteBtn.hidden = false;
    }
  } catch (err) {
    // transient network hiccup - next poll will retry
  }
}

retryWriteBtn.addEventListener("click", () => {
  const code = modalCodeEl.textContent;
  if (code) armWrite(code, false);
});

overwriteWriteBtn.addEventListener("click", () => {
  const code = modalCodeEl.textContent;
  if (code && confirm("This will erase whatever's currently on that tag. Continue?")) {
    armWrite(code, true);
  }
});

closeModalBtn.addEventListener("click", () => {
  overlayEl.hidden = true;
  if (writePollHandle) clearInterval(writePollHandle);
  writePollHandle = null;
});

refreshLibrary();
setInterval(refreshLibrary, 3000);
</script>
</body>
</html>
