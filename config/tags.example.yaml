# Map each vinyl's NFC tag UID (as printed by mini_vinyl, uppercase hex,
# colon-separated) to something to play.
#
# type: youtube | spotify
#   youtube -> id is a full video URL (or bare video ID)
#   spotify -> id is a Spotify URI: spotify:track:..., spotify:album:...,
#              or spotify:playlist:...
#
# Run `python -m mini_vinyl.main --scan` to print the UID of a tag you
# hold to the reader, then paste it in here.

tags:
  "04:A1:B2:C3:D4:5E:6F":
    type: youtube
    id: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
    title: "Side A - Track 1"

  "04:1A:2B:3C:4D:5E:6F":
    type: spotify
    id: "spotify:album:4LH4d3cOWNNsVw41Gqt2kv"
    title: "Side B - Full Album"
